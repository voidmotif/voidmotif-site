<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID MOTIF | Official</title>
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --accent: #00ff41; 
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
            z-index: 5;
        }

        header {
            margin-bottom: 60px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0;
            line-height: 1;
        }

        .status {
            font-size: 0.7rem;
            color: var(--accent);
            margin-top: 10px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        a {
            display: block;
            padding: 15px;
            border: 1px solid var(--fg);
            color: var(--fg);
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        a:hover {
            background-color: var(--fg);
            color: var(--bg);
            cursor: crosshair;
        }

        footer {
            margin-top: 80px;
            font-size: 0.6rem;
            opacity: 0.5;
            line-height: 2;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>VOID MOTIF</h1>
            <div class="status">● SIGNAL_ACTIVE</div>
        </header>

        <div class="links">
            <a href="https://voidmotif.bandcamp.com" target="_blank">BANDCAMP</a>
            <a href="https://open.spotify.com/artist/1RqSEsOoxltiCNz8zgy6g9" target="_blank">SPOTIFY</a>
            <a href="https://music.apple.com/us/artist/void-motif/1888812041" target="_blank">APPLE MUSIC</a>
            <a href="#" target="_blank">SOUNDCLOUD</a>
            <a href="https://www.instagram.com/voidmotif" target="_blank">INSTAGRAM</a>
        </div>

        <footer>
            TR-909 // TB-303 // JUPITER-8 // AMPEX ATR-102<br>
            LEEDS, UK // 2026
        </footer>
    </div>

</body>
</html>
